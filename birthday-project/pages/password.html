<!-- ============================================================
     pages/password.html
     PAGE 2 — Password Gate
     Shown on the birthday. Edit the heading / hint text here.
     The actual password is set in data/content.js → CONFIG.password
============================================================ -->

<div class="pw-wrap">

  <p class="eyebrow fade-up d1">You made it.</p>

  <h2 class="display pw-display fade-up d2">
    "If you've reached here,<br>
    it means you are<br>
    my forever."
  </h2>

  <div class="gold-line centered fade-up d3"></div>

  <!-- Edit the hint to match your password -->
  <p class="pw-hint fade-up d3">
    Hint: the name I gave you — the one only we know 🌸
  </p>

  <input
    class="pw-field fade-up d4"
    type="password"
    id="pw-in"
    placeholder="···"
    autocomplete="off"
  />

  <p class="pw-err" id="pw-err"></p>

  <button class="btn-gold fade-up d5" onclick="checkPw()">
    Open My Heart
  </button>

</div>
